name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift build
        run: swift build

